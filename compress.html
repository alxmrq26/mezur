<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compresseur d'images — Mezur</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --navy:  #0B1F4B;
      --or:    #C9A96E;
      --or-light: #E8D5A3;
      --creme: #F5F0E8;
      --slate: #3D3D3D;
      --stone: #9B9B9B;
      --pearl: #F7F7F7;
      --blanc: #FFFFFF;
      --font-display: 'Cormorant Garamond', serif;
      --font-body: 'Jost', sans-serif;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    body {
      font-family: var(--font-body);
      background: var(--pearl);
      color: var(--slate);
      font-weight: 300;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    header {
      background: var(--navy);
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: var(--font-display);
      font-size: 22px;
      color: var(--blanc);
      letter-spacing: 0.12em;
    }
    .logo span { color: var(--or); }
    .header-tag {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--or);
    }

    /* ── MAIN ── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    h1 {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 300;
      color: var(--navy);
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 13px;
      color: var(--stone);
      letter-spacing: 0.05em;
      margin-bottom: 40px;
    }

    /* ── PRESETS ── */
    .presets-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--stone);
      margin-bottom: 12px;
    }
    .presets {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }
    .preset-btn {
      border: 1.5px solid var(--or-light);
      background: var(--blanc);
      color: var(--navy);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 400;
      padding: 8px 16px;
      cursor: pointer;
      transition: all 0.2s var(--ease);
      letter-spacing: 0.05em;
    }
    .preset-btn:hover, .preset-btn.active {
      background: var(--navy);
      border-color: var(--navy);
      color: var(--blanc);
    }
    .preset-btn .preset-dims {
      display: block;
      font-size: 10px;
      color: var(--stone);
      margin-top: 2px;
    }
    .preset-btn.active .preset-dims { color: var(--or-light); }

    /* ── DROP ZONE ── */
    .drop-zone {
      border: 2px dashed var(--or-light);
      background: var(--blanc);
      padding: 60px 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s var(--ease);
      position: relative;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--or);
      background: #fffdf9;
    }
    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .drop-icon {
      font-size: 40px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    .drop-title {
      font-family: var(--font-display);
      font-size: 20px;
      color: var(--navy);
      margin-bottom: 8px;
    }
    .drop-hint {
      font-size: 12px;
      color: var(--stone);
      letter-spacing: 0.05em;
    }

    /* ── SETTINGS ── */
    .settings {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin: 24px 0;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .field label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--stone);
    }
    .field input[type="number"],
    .field select {
      border: 1.5px solid #E0D9CE;
      background: var(--blanc);
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--navy);
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    .field input:focus, .field select:focus { border-color: var(--or); }

    .quality-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .quality-row label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--stone);
      display: flex;
      justify-content: space-between;
    }
    .quality-row label span { color: var(--or); }
    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: var(--or-light);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: var(--or);
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.15s;
    }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

    /* ── RESULTS ── */
    #results { display: none; }

    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 32px;
    }

    .result-card {
      background: var(--blanc);
      border: 1.5px solid #E0D9CE;
      overflow: hidden;
    }
    .result-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }
    .result-info {
      padding: 16px;
    }
    .result-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--stone);
      margin-bottom: 8px;
    }
    .result-stat {
      font-family: var(--font-display);
      font-size: 24px;
      color: var(--navy);
    }
    .result-sub {
      font-size: 12px;
      color: var(--stone);
      margin-top: 4px;
    }
    .result-card.after .result-stat { color: var(--or); }

    .saving-badge {
      display: inline-block;
      background: var(--navy);
      color: var(--blanc);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      padding: 4px 10px;
      margin-top: 8px;
    }

    /* ── BTN DOWNLOAD ── */
    .btn-download {
      display: block;
      width: 100%;
      margin-top: 24px;
      background: var(--navy);
      color: var(--blanc);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 18px;
      text-align: center;
      border: none;
      cursor: pointer;
      transition: background 0.2s var(--ease);
    }
    .btn-download:hover { background: var(--or); }

    /* ── BATCH ── */
    .batch-list {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .batch-item {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      align-items: center;
      gap: 16px;
      background: var(--blanc);
      border: 1.5px solid #E0D9CE;
      padding: 12px 16px;
    }
    .batch-name { font-size: 13px; color: var(--navy); }
    .batch-before { font-size: 12px; color: var(--stone); text-align: right; }
    .batch-after { font-size: 12px; color: var(--or); font-weight: 500; text-align: right; }
    .batch-dl {
      background: none;
      border: 1.5px solid var(--navy);
      color: var(--navy);
      font-family: var(--font-body);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .batch-dl:hover { background: var(--navy); color: var(--blanc); }

    .btn-dl-all {
      display: block;
      width: 100%;
      margin-top: 16px;
      background: var(--or);
      color: var(--blanc);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 16px;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-dl-all:hover { background: var(--navy); }

    .divider {
      border: none;
      border-top: 1px solid #E0D9CE;
      margin: 40px 0;
    }

    @media (max-width: 600px) {
      .settings { grid-template-columns: 1fr 1fr; }
      .results-grid { grid-template-columns: 1fr; }
      .batch-item { grid-template-columns: 1fr 1fr; gap: 8px; }
      .batch-name { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">MEZUR <span>·</span> Outils</div>
  <div class="header-tag">Compresseur d'images</div>
</header>

<main>
  <h1>Compresseur d'images</h1>
  <p class="subtitle">Compresse automatiquement à la taille maximale d'affichage du site Mezur</p>

  <!-- Presets -->
  <p class="presets-label">Preset d'affichage</p>
  <div class="presets">
    <button class="preset-btn active" data-w="1440" data-h="900" data-q="82" onclick="applyPreset(this)">
      Hero / Fond
      <span class="preset-dims">1440 × 900 px</span>
    </button>
    <button class="preset-btn" data-w="800" data-h="800" data-q="82" onclick="applyPreset(this)">
      Photo de plat
      <span class="preset-dims">800 × 800 px</span>
    </button>
    <button class="preset-btn" data-w="600" data-h="800" data-q="82" onclick="applyPreset(this)">
      Portrait / Chef
      <span class="preset-dims">600 × 800 px</span>
    </button>
    <button class="preset-btn" data-w="400" data-h="500" data-q="82" onclick="applyPreset(this)">
      Carrousel menu
      <span class="preset-dims">400 × 500 px</span>
    </button>
    <button class="preset-btn" data-w="0" data-h="0" data-q="82" onclick="applyPreset(this)">
      Personnalisé
      <span class="preset-dims">dimensions libres</span>
    </button>
  </div>

  <!-- Drop zone -->
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="image/*" multiple>
    <div class="drop-icon">⬆</div>
    <div class="drop-title">Déposer les images ici</div>
    <p class="drop-hint">ou cliquer pour sélectionner · JPG, PNG, WebP, AVIF · plusieurs fichiers acceptés</p>
  </div>

  <!-- Settings -->
  <div class="settings">
    <div class="field">
      <label>Largeur max (px)</label>
      <input type="number" id="maxW" value="1440" min="100" max="3840">
    </div>
    <div class="field">
      <label>Hauteur max (px)</label>
      <input type="number" id="maxH" value="900" min="100" max="3840">
    </div>
    <div class="field">
      <label>Format de sortie</label>
      <select id="outputFormat">
        <option value="image/webp">WebP (recommandé)</option>
        <option value="image/jpeg">JPEG</option>
        <option value="image/png">PNG</option>
      </select>
    </div>
  </div>

  <div class="quality-row">
    <label>Qualité <span id="qualityVal">82%</span></label>
    <input type="range" id="quality" min="30" max="100" value="82">
  </div>

  <!-- Results (single file) -->
  <div id="results">
    <hr class="divider">
    <div class="results-grid">
      <div class="result-card">
        <img id="beforeImg" src="" alt="Avant">
        <div class="result-info">
          <p class="result-label">Original</p>
          <p class="result-stat" id="beforeSize">—</p>
          <p class="result-sub" id="beforeDims">—</p>
        </div>
      </div>
      <div class="result-card after">
        <img id="afterImg" src="" alt="Après">
        <div class="result-info">
          <p class="result-label">Compressée</p>
          <p class="result-stat" id="afterSize">—</p>
          <p class="result-sub" id="afterDims">—</p>
          <span class="saving-badge" id="savingBadge"></span>
        </div>
      </div>
    </div>
    <button class="btn-download" id="downloadBtn">Télécharger l'image compressée</button>
  </div>

  <!-- Batch results (multiple files) -->
  <div id="batchResults" style="display:none">
    <hr class="divider">
    <div class="batch-list" id="batchList"></div>
    <button class="btn-dl-all" id="dlAllBtn">Tout télécharger</button>
  </div>

</main>

<canvas id="canvas" style="display:none"></canvas>

<script>
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const canvas   = document.getElementById('canvas');
  const ctx      = canvas.getContext('2d');

  let compressedBlobs = [];

  // ── Quality slider display ──
  const qualitySlider = document.getElementById('quality');
  qualitySlider.addEventListener('input', () => {
    document.getElementById('qualityVal').textContent = qualitySlider.value + '%';
  });

  // ── Presets ──
  function applyPreset(btn) {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const w = +btn.dataset.w, h = +btn.dataset.h, q = +btn.dataset.q;
    if (w > 0) {
      document.getElementById('maxW').value = w;
      document.getElementById('maxH').value = h;
    }
    qualitySlider.value = q;
    document.getElementById('qualityVal').textContent = q + '%';
  }

  // ── Drag & drop ──
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    handleFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', () => handleFiles(fileInput.files));

  // ── File handling ──
  function handleFiles(files) {
    if (!files.length) return;
    compressedBlobs = [];
    document.getElementById('results').style.display      = 'none';
    document.getElementById('batchResults').style.display = 'none';
    document.getElementById('batchList').innerHTML        = '';

    if (files.length === 1) {
      processSingle(files[0]);
    } else {
      processBatch([...files]);
    }
  }

  // ── Compress one image ──
  function compress(file) {
    return new Promise(resolve => {
      const maxW   = +document.getElementById('maxW').value   || 9999;
      const maxH   = +document.getElementById('maxH').value   || 9999;
      const quality = +qualitySlider.value / 100;
      const format  = document.getElementById('outputFormat').value;

      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          let w = img.naturalWidth, h = img.naturalHeight;
          const ratio = Math.min(maxW / w, maxH / h, 1);
          w = Math.round(w * ratio);
          h = Math.round(h * ratio);

          canvas.width  = w;
          canvas.height = h;
          ctx.clearRect(0, 0, w, h);
          ctx.drawImage(img, 0, 0, w, h);

          canvas.toBlob(blob => resolve({ blob, w, h, orig: file.size }), format, quality);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  // ── Single file flow ──
  async function processSingle(file) {
    const beforeURL = URL.createObjectURL(file);
    document.getElementById('beforeImg').src = beforeURL;
    document.getElementById('beforeSize').textContent = formatBytes(file.size);

    const orig = new Image();
    orig.onload = () => {
      document.getElementById('beforeDims').textContent =
        orig.naturalWidth + ' × ' + orig.naturalHeight + ' px';
    };
    orig.src = beforeURL;

    const { blob, w, h } = await compress(file);
    compressedBlobs = [{ blob, name: compressedName(file.name) }];

    const afterURL = URL.createObjectURL(blob);
    document.getElementById('afterImg').src  = afterURL;
    document.getElementById('afterSize').textContent = formatBytes(blob.size);
    document.getElementById('afterDims').textContent = w + ' × ' + h + ' px';

    const saving = Math.round((1 - blob.size / file.size) * 100);
    document.getElementById('savingBadge').textContent = '− ' + saving + '% de poids';

    document.getElementById('results').style.display = 'block';

    document.getElementById('downloadBtn').onclick = () => {
      downloadBlob(blob, compressedName(file.name));
    };
  }

  // ── Batch flow ──
  async function processBatch(files) {
    document.getElementById('batchResults').style.display = 'block';
    const list = document.getElementById('batchList');

    for (const file of files) {
      const { blob, w, h } = await compress(file);
      const name = compressedName(file.name);
      compressedBlobs.push({ blob, name });

      const saving = Math.round((1 - blob.size / file.size) * 100);
      const item = document.createElement('div');
      item.className = 'batch-item';
      item.innerHTML = `
        <span class="batch-name">${file.name}</span>
        <span class="batch-before">${formatBytes(file.size)}</span>
        <span class="batch-after">${formatBytes(blob.size)} <small style="color:var(--stone)">−${saving}%</small></span>
        <button class="batch-dl">Télécharger</button>
      `;
      item.querySelector('.batch-dl').onclick = () => downloadBlob(blob, name);
      list.appendChild(item);
    }

    document.getElementById('dlAllBtn').onclick = () => {
      compressedBlobs.forEach(({ blob, name }) => downloadBlob(blob, name));
    };
  }

  // ── Helpers ──
  function compressedName(original) {
    const ext = document.getElementById('outputFormat').value === 'image/webp' ? 'webp'
              : document.getElementById('outputFormat').value === 'image/jpeg' ? 'jpg' : 'png';
    return original.replace(/\.[^.]+$/, '') + '_mezur.' + ext;
  }

  function downloadBlob(blob, name) {
    const a = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = name;
    a.click();
  }

  function formatBytes(bytes) {
    if (bytes < 1024)       return bytes + ' o';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' Ko';
    return (bytes / 1024 / 1024).toFixed(2) + ' Mo';
  }
</script>
</body>
</html>
